<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRS Document Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { background-color: #525659; }
    #pdf-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .pdf-page {
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      max-width: 100%;
      height: auto !important;
    }
  </style>
</head>
<body class="antialiased min-h-screen relative">
  <!-- Header / Navigation -->
  <div class="fixed top-0 left-0 right-0 bg-slate-900 border-b border-slate-700 p-4 shadow-lg flex justify-between items-center z-50">
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='https://partha607.github.io/ne-bro-maku-sec-proposal/'" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition text-sm font-semibold flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Back
      </button>
      <h1 class="text-white font-semibold text-sm md:text-lg max-w-[200px] sm:max-w-md truncate">SOFTWARE REQUIREMENT SPECIFICATION</h1>
    </div>
    <div class="text-slate-400 text-sm font-medium pr-4" id="page-count">
      Loading...
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-[#525659] z-40 mt-16">
    <div class="flex flex-col items-center">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white mb-4"></div>
      <div class="text-white font-medium">Loading Document...</div>
    </div>
  </div>

  <!-- PDF Display Container -->
  <div id="pdf-container" class="mt-16 w-full"></div>

  <script>
    const url = 'SOFTWARE REQUIREMENT SPECIFICATION NE Brothers.pdf';
    
    // Set up PDF.js worker
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    const container = document.getElementById('pdf-container');
    const loadingEl = document.getElementById('loading');
    const pageCountEl = document.getElementById('page-count');

    // Asynchronously downloads PDF
    pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
      pdfDoc = pdfDoc_;
      pageCountEl.textContent = `1 / ${pdfDoc.numPages} Pages`;
      
      // Render all pages
      let pagesPromises = [];
      for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
        pagesPromises.push(pdfDoc.getPage(pageNum));
      }

      Promise.all(pagesPromises).then(function(pages) {
        pages.forEach(function(page) {
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          canvas.className = 'pdf-page rounded-sm bg-white';
          
          const renderContext = {
            canvasContext: ctx,
            viewport: viewport
          };
          
          page.render(renderContext);
          container.appendChild(canvas);
        });

        // Hide loading
        loadingEl.style.display = 'none';

        // Implement simple scroll-spy to update page count
        window.addEventListener('scroll', () => {
          const canvases = document.querySelectorAll('canvas.pdf-page');
          let currentPage = 1;
          for (let i = 0; i < canvases.length; i++) {
            const rect = canvases[i].getBoundingClientRect();
            if (rect.top <= window.innerHeight / 2) {
              currentPage = i + 1;
            }
          }
          pageCountEl.textContent = `Page ${currentPage} of ${pdfDoc.numPages}`;
        });
      });
    }).catch(err => {
      console.error('Error loading PDF:', err);
      loadingEl.innerHTML = `<div class="text-red-400 font-bold bg-slate-800 p-4 rounded-lg">Error loading PDF: ${err.message}</div>`;
    });
  </script>
</body>
</html>
